
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Muskan & Partnerflix</title>
  <style>
    body {
      margin: 0;
      background-color: #141414;
      font-family: Arial, sans-serif;
      color: white;
    }
    header {
      background-color: #000;
      padding: 20px;
      font-size: 24px;
      color: #e50914;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .card {
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    .card h3 {
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <header>❤️ krusha & [shlok] lovemflix ❤️</header>
  <div class="grid">
    <div class="card">
      <img src="trip.jpg" alt="Our First Trip">
      <h3>Our First Trip</h3>
    </div>
    <div class="card">
      <img src="dinner.jpg" alt="Romantic Dinner">
      <h3>Romantic Dinner</h3>
    </div>
    <div class="card">
      <img src="funny.jpg" alt="Comedy Moments">
      <h3>Comedy Moments</h3>
    </div>
    <div class="card">
      <img src="special.jpg" alt="Anniversary Special">
      <h3>Anniversary Special</h3>
    </div>
  </div>
</body>
</html>
